name: Android CI
run-name: ${{github.workflow}} - ${{vars.TAG}} - ${{github.sha}}

on:
  workflow_dispatch:
    inputs:
      password:
        description: 'Password'
        required: true
      branch:
        description: 'Branch'
        required: true
        default: 'master'

permissions:
    id-token: write
    contents: read
    attestations: write

jobs:
  build:

    runs-on: ubuntu-latest

    #https://github.com/actions/checkout
    #https://github.com/actions/setup-java
    steps:
    - uses: actions/checkout@v6
      with:
        ref: ${{ github.event.inputs.branch }}
    - name: set up JDK 17
      uses: actions/setup-java@v5
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    #https://github.com/actions/runner/issues/643
    - name: Mask password
      run: |
        INP_PASSWORD=$(jq -r '.inputs.password' $GITHUB_EVENT_PATH)
        echo ::add-mask::$INP_PASSWORD
        echo PASSWORD="$INP_PASSWORD" >> $GITHUB_ENV

    #https://stefma.medium.com/how-to-store-a-android-keystore-safely-on-github-actions-f0cef9413784
    #gpg -c --armor --s2k-mode 3 --s2k-digest-algo SHA256 --s2k-count 10000000 --cipher-algo AES-256 <file>
    - name: Decrypt secrets
      run: |
        echo "${{ secrets.KEYSTORE }}" > keystore.asc
        gpg -d --passphrase "${PASSWORD}" --batch keystore.asc > Android.keystore
        echo "${{ secrets.KEYSTORE_PROPERTIES }}" > keystore.properties.asc
        gpg -d --passphrase "${PASSWORD}" --batch keystore.properties.asc > keystore.properties
        echo "${{ secrets.LOCAL_PROPERTIES }}" > local.properties.asc
        gpg -d --passphrase "${PASSWORD}" --batch local.properties.asc > local.properties
    - name: Apply private patch
      run: |
        echo "${{ secrets.PATCH1 }}" > private.patch.asc
        gpg -d --passphrase "${PASSWORD}" --batch private.patch.asc > private.patch
        git apply --check private.patch
        git apply private.patch
    - name: Verify patch
      run: |
        git status --short
    - name: Grant execute permission for gradlew
      run: chmod +x gradlew
    - name: Check with Lint
      run: ./gradlew lintGithubRelease
    - name: Build with Gradle
      run: ./gradlew assembleGithubRelease
    #https://docs.github.com/en/actions/security-guides/using-artifact-attestations-to-establish-provenance-for-builds
    #https://github.com/actions/attest-build-provenance
    #- name: Generate artifact attestation
    #  uses: actions/attest-build-provenance@v4
    #  with:
    #    subject-path: 'app/build/outputs/apk/github/release/*.apk'
    #- uses: actions/upload-artifact@v6
    #  with:
    #    name: APK files
    #    path: app/build/outputs/apk/github/release/*.apk
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: 3.12
    - name: Send to Telegram
      env:
        BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
        CHAT_ID: ${{ secrets.CHAT_ID }}
        COMMIT_ID: ${{ github.event.head_commit.id }}
        COMMIT_URL: ${{ github.event.head_commit.url }}
        COMMIT_MESSAGE: ${{ github.event.head_commit.message }}
        BUILD_TIMESTAMP: ${{ needs.build.outputs.build_timestamp }}
      run: |
        python -m pip install requests
        python .github/workflows/upload2.py